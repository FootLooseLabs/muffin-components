name: Validate Component PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate registry and component
        id: validate
        run: node .github/scripts/validate.js
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Label PR — passed
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['auto-review: passed']
            });

      - name: Comment — passed
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Auto-review passed.** All checks completed successfully. A maintainer will review and merge.`
            });

      - name: Comment — failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errors = '';
            try {
              errors = fs.readFileSync('/tmp/validation-errors.txt', 'utf8');
            } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Auto-review failed.**\n\n${errors}\n\nPlease fix the issues above and push again.`
            });
