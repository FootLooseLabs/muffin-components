name: Validate Component PR

on:
  pull_request_target:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Checkout base repo (for scripts)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout PR head into pr/
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate registry and component
        id: validate
        run: node $GITHUB_WORKSPACE/.github/scripts/validate.js
        working-directory: pr

      - name: Write job summary
        if: always()
        run: cat /tmp/validation-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Label PR — passed
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['auto-review: passed']
            });

      - name: Comment — passed
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let checklist = '';
            try {
              checklist = fs.readFileSync('/tmp/validation-summary.md', 'utf8');
            } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Auto-review passed.** A maintainer will review and merge.\n\n${checklist}`
            });

      - name: Comment — failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let checklist = '';
            try {
              checklist = fs.readFileSync('/tmp/validation-summary.md', 'utf8');
            } catch(e) {}
            let errors = '';
            try {
              errors = fs.readFileSync('/tmp/validation-errors.txt', 'utf8');
            } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Auto-review failed.**\n\n${checklist}\n\n**Errors**\n${errors}\n\nPlease fix the issues above and push again.`
            });
